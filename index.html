<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#12100f">
  <title>Тренажер Таро</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #12100f;
      --bg-2: #19131d;
      --panel: rgba(35, 29, 38, 0.84);
      --panel-strong: #261f2b;
      --panel-soft: rgba(255, 255, 255, 0.07);
      --text: #fff8ec;
      --muted: #d9cbbb;
      --soft: #a99ba8;
      --line: rgba(255, 248, 236, 0.14);
      --gold: #f0c66a;
      --mint: #83d6c8;
      --rose: #e68ba4;
      --violet: #9a8be6;
      --green: #a8d672;
      --danger: #ef9a9a;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.38);
      --radius: 18px;
      --nav-height: 76px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      background: var(--bg);
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 15% -4%, rgba(240, 198, 106, 0.18), transparent 18rem),
        radial-gradient(circle at 92% 12%, rgba(131, 214, 200, 0.16), transparent 18rem),
        linear-gradient(155deg, #12100f 0%, #1d1722 48%, #101819 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .app-shell {
      width: min(100%, 760px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 14px calc(var(--nav-height) + 28px + env(safe-area-inset-bottom));
    }

    .view {
      animation: appear 220ms ease-out both;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero {
      display: grid;
      gap: 18px;
      padding: 18px 0 8px;
    }

    .eyebrow {
      width: fit-content;
      margin: 0;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 0.84rem;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 8px;
      font-size: clamp(2.6rem, 12vw, 4.8rem);
      line-height: 0.94;
      letter-spacing: 0;
    }

    h2 {
      margin-bottom: 12px;
      font-size: clamp(1.55rem, 7vw, 2.35rem);
      line-height: 1.04;
      letter-spacing: 0;
    }

    h3 {
      margin-bottom: 8px;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .subtitle,
    .muted {
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .subtitle {
      max-width: 34rem;
      margin-bottom: 0;
      font-size: 1.04rem;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .panel-pad {
      padding: 16px;
    }

    .magic-card {
      position: relative;
      overflow: hidden;
    }

    .magic-card::before {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(240, 198, 106, 0.18), transparent 42%),
        linear-gradient(215deg, rgba(131, 214, 200, 0.12), transparent 44%);
      content: "";
    }

    .magic-card > * {
      position: relative;
      z-index: 1;
    }

    .hero-card {
      display: grid;
      gap: 16px;
      padding: 18px;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      min-width: 0;
      padding: 12px 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
    }

    .stat strong {
      display: block;
      color: var(--text);
      font-size: 1.35rem;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 7px;
      color: var(--soft);
      font-size: 0.76rem;
      line-height: 1.2;
    }

    .progress-bar {
      height: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.22);
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), var(--mint));
      box-shadow: 0 0 18px rgba(240, 198, 106, 0.28);
      transition: width 220ms ease;
    }

    .button-row,
    .quick-grid,
    .filters,
    .answer-grid {
      display: grid;
      gap: 10px;
    }

    .button-row.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .quick-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .btn {
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      cursor: pointer;
      overflow-wrap: anywhere;
      touch-action: manipulation;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .btn.primary {
      border-color: rgba(240, 198, 106, 0.58);
      background: linear-gradient(135deg, #f0c66a, #f3a96d);
      color: #271908;
      font-weight: 800;
      box-shadow: 0 16px 34px rgba(240, 198, 106, 0.24);
    }

    .btn.good {
      border-color: rgba(131, 214, 200, 0.5);
      background: rgba(131, 214, 200, 0.13);
    }

    .btn.warn {
      border-color: rgba(230, 139, 164, 0.5);
      background: rgba(230, 139, 164, 0.12);
    }

    .btn.ghost {
      min-height: 40px;
      padding: 8px 11px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .btn.selected,
    .btn[aria-current="true"] {
      border-color: rgba(240, 198, 106, 0.7);
      background: rgba(240, 198, 106, 0.14);
      color: #ffe5a6;
    }

    .btn.answer {
      min-height: 58px;
      text-align: left;
    }

    .btn.correct {
      border-color: rgba(131, 214, 200, 0.78);
      background: rgba(131, 214, 200, 0.18);
    }

    .btn.wrong {
      border-color: rgba(239, 154, 154, 0.72);
      background: rgba(239, 154, 154, 0.15);
    }

    .section-head {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
      margin: 8px 0 14px;
    }

    .section-head p {
      margin-bottom: 0;
    }

    .filters {
      grid-auto-flow: column;
      grid-auto-columns: max-content;
      margin: 0 -14px 14px;
      padding: 0 14px 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar {
      display: none;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .card-row {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      width: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.065);
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .sigil {
      display: grid;
      width: 48px;
      height: 58px;
      place-items: center;
      border: 1px solid rgba(240, 198, 106, 0.3);
      border-radius: 14px;
      background:
        linear-gradient(145deg, rgba(240, 198, 106, 0.12), rgba(131, 214, 200, 0.08)),
        rgba(0, 0, 0, 0.16);
      color: var(--gold);
      font-size: 1.3rem;
    }

    .card-row strong,
    .card-title strong {
      display: block;
      overflow-wrap: anywhere;
      line-height: 1.2;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
      color: var(--soft);
      font-size: 0.78rem;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--muted);
      font-size: 0.78rem;
    }

    .level {
      min-width: 64px;
      color: var(--gold);
      font-size: 0.82rem;
      text-align: right;
      white-space: nowrap;
    }

    .detail-card {
      display: grid;
      gap: 14px;
      margin-bottom: 14px;
      padding: 16px;
    }

    .detail-top {
      display: grid;
      grid-template-columns: 68px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
    }

    .big-sigil {
      display: grid;
      width: 68px;
      height: 92px;
      place-items: center;
      border: 1px solid rgba(240, 198, 106, 0.35);
      border-radius: 16px;
      background:
        radial-gradient(circle at 50% 26%, rgba(240, 198, 106, 0.22), transparent 38%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
      color: var(--gold);
      font-size: 1.8rem;
    }

    .info-grid {
      display: grid;
      gap: 10px;
    }

    .note {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.055);
    }

    .note p:last-child {
      margin-bottom: 0;
    }

    .journey-list {
      display: grid;
      gap: 12px;
    }

    .journey-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
    }

    .journey-card.done {
      border-color: rgba(131, 214, 200, 0.46);
      background: rgba(131, 214, 200, 0.09);
    }

    .question-card {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .question-type {
      color: var(--gold);
      font-size: 0.84rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .question-text {
      margin-bottom: 0;
      font-size: 1.2rem;
      line-height: 1.34;
    }

    .result {
      border-color: rgba(240, 198, 106, 0.38);
      background: rgba(240, 198, 106, 0.09);
    }

    .spread-grid {
      display: grid;
      gap: 12px;
    }

    .spread-position {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
    }

    .textarea {
      width: 100%;
      min-height: 136px;
      resize: vertical;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 16px;
      outline: none;
      background: rgba(0, 0, 0, 0.2);
      color: var(--text);
    }

    .textarea:focus {
      border-color: rgba(240, 198, 106, 0.62);
      box-shadow: 0 0 0 3px rgba(240, 198, 106, 0.12);
    }

    .progress-list {
      display: grid;
      gap: 10px;
    }

    .mode-grid,
    .achievement-grid {
      display: grid;
      gap: 10px;
    }

    .mode-card,
    .achievement-card {
      display: grid;
      gap: 8px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      cursor: pointer;
      text-align: left;
      touch-action: manipulation;
    }

    .mode-card.selected {
      border-color: rgba(240, 198, 106, 0.65);
      background: rgba(240, 198, 106, 0.13);
    }

    .achievement-card {
      grid-template-columns: 48px minmax(0, 1fr);
      align-items: center;
      opacity: 0.58;
    }

    .achievement-card.unlocked {
      border-color: rgba(240, 198, 106, 0.5);
      background: rgba(240, 198, 106, 0.11);
      opacity: 1;
    }

    .achievement-card .sigil {
      width: 48px;
      height: 58px;
    }

    .path-overview {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .day-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .day-card.done {
      border-color: rgba(131, 214, 200, 0.52);
      background: rgba(131, 214, 200, 0.09);
      box-shadow: 0 0 28px rgba(131, 214, 200, 0.08);
    }

    .day-card summary {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 64px;
      padding: 12px;
      cursor: pointer;
      list-style: none;
    }

    .day-card summary::-webkit-details-marker {
      display: none;
    }

    .day-number {
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      border: 1px solid rgba(240, 198, 106, 0.34);
      border-radius: 14px;
      color: var(--gold);
      font-weight: 800;
    }

    .day-status {
      color: var(--mint);
      font-size: 0.88rem;
      white-space: nowrap;
    }

    .day-content {
      display: grid;
      gap: 10px;
      padding: 0 12px 12px;
    }

    .mini-card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .mini-card {
      display: grid;
      min-height: 92px;
      place-items: center;
      padding: 8px;
      border: 1px solid rgba(240, 198, 106, 0.25);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.16);
      color: var(--muted);
      text-align: center;
      font-size: 0.78rem;
    }

    .lesson-card,
    .formula-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
    }

    .formula-steps,
    .court-grid {
      display: grid;
      gap: 10px;
    }

    .formula-steps {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .formula-step {
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.14);
    }

    .suit-hero {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    @media (min-width: 680px) {
      .court-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 380px) {
      .formula-steps,
      .mini-card-grid {
        grid-template-columns: 1fr;
      }
    }

    .control-menu {
      margin: 0 0 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.055);
    }

    .control-menu summary {
      display: flex;
      min-height: 48px;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      color: var(--gold);
      cursor: pointer;
      font-weight: 800;
      list-style: none;
    }

    .control-menu summary::-webkit-details-marker {
      display: none;
    }

    .control-menu summary::after {
      color: var(--muted);
      content: "раскрыть";
      font-size: 0.78rem;
      font-weight: 600;
    }

    .control-menu[open] summary::after {
      content: "скрыть";
    }

    .control-menu-content {
      display: grid;
      gap: 10px;
      padding: 0 12px 12px;
    }

    .reader-float {
      position: fixed;
      right: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 30;
      min-height: 46px;
      padding: 10px 14px;
      border: 1px solid rgba(240, 198, 106, 0.6);
      border-radius: 999px;
      background: rgba(18, 16, 15, 0.92);
      color: var(--gold);
      box-shadow: var(--shadow);
    }

    body.reading-mode .bottom-nav {
      opacity: 0;
      pointer-events: none;
      transform: translateY(110%);
    }

    body.reading-mode .app-shell {
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }

    .bottom-nav {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 20;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(18, 16, 15, 0.88);
      backdrop-filter: blur(22px);
      padding: 8px max(8px, env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-right));
    }

    .bottom-nav-inner {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 5px;
      width: min(100%, 760px);
      margin: 0 auto;
    }

    .nav-btn {
      display: grid;
      gap: 3px;
      min-width: 0;
      min-height: 58px;
      place-items: center;
      border: 0;
      border-radius: 14px;
      background: transparent;
      color: var(--soft);
      cursor: pointer;
    }

    .nav-btn span:first-child {
      font-size: 1.1rem;
      line-height: 1;
    }

    .nav-btn span:last-child {
      max-width: 100%;
      overflow: hidden;
      font-size: 0.68rem;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-btn.active {
      background: rgba(240, 198, 106, 0.14);
      color: var(--gold);
    }

    .empty {
      padding: 18px;
      border: 1px dashed rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      color: var(--muted);
      text-align: center;
    }

    .fine-print {
      margin: 18px 0 0;
      color: rgba(217, 203, 187, 0.74);
      font-size: 0.78rem;
    }

    @media (min-width: 680px) {
      .app-shell {
        padding-right: 18px;
        padding-left: 18px;
      }

      .quick-grid,
      .answer-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .info-grid,
      .spread-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hero-card {
        padding: 22px;
      }
    }

    @media (max-width: 360px) {
      .app-shell {
        padding-right: 12px;
        padding-left: 12px;
      }

      .progress-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat strong {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <main id="app" class="app-shell" aria-live="polite"></main>

  <nav class="bottom-nav" aria-label="Нижняя навигация">
    <div class="bottom-nav-inner" id="bottomNav"></div>
  </nav>

  <script>
    const STORAGE_KEY = "tarotTrainerProgress.v1";
    const DAILY_FOCUS_KEY = "tarotTrainerDailyFocus.v2";

    function createProgressMap() {

    function loadProgress() {
      const fallback = {
        cards: createProgressMap(),
        stats: {
          questions: 0,
          correct: 0,
          sessions: 0,
          spreads: 0
        },
        learningPath: {
          completedDays: []
        }
      };

      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        const cards = createProgressMap();
        Object.keys(cards).forEach((id) => {
          cards[id] = {
            ...cards[id],
            ...(saved.cards && saved.cards[id] ? saved.cards[id] : {})
          };
        });
        return {
          cards,
          stats: {
            ...fallback.stats,
            ...(saved.stats || {})
          },
          learningPath: {
            ...fallback.learningPath,
            ...(saved.learningPath || {})
          }
        };
      } catch (error) {
        return fallback;
      }
    }

        stats: {
          questions: 0,
          correct: 0,
          sessions: 0,
          spreads: 0
        },
        learningPath: {
          completedDays: []
        }
      };
      saveProgress();
    }

    function getLearningPathStats() {
      const completedDays = progress.learningPath && Array.isArray(progress.learningPath.completedDays)
        ? progress.learningPath.completedDays
        : [];
      return {
        completedDays,
        completed: completedDays.length,
        total: learningPathDays.length,
        percent: Math.round((completedDays.length / learningPathDays.length) * 100)
      };
    }

    function completeLearningDay(day) {
      const stats = getLearningPathStats();
      if (!stats.completedDays.includes(day)) {
        progress.learningPath.completedDays = [...stats.completedDays, day].sort((a, b) => a - b);
        saveProgress();
      }
      render();
    }

    function resetLearningPath() {
      progress.learningPath = {
        completedDays: []
      };
      state.pathCards = [];
      saveProgress();
      render();
    }

    function getStats() {
      const items = Object.values(progress.cards);
      const studied = items.filter((item) => item.studied || item.level >= 3).length;
      const confident = items.filter((item) => item.level >= 4).length;
      const favorites = items.filter((item) => item.favorite).length;
      const weak = items.filter((item) => item.wrong > 0 && (item.wrong >= item.correct || item.level < 3)).length;
      const wrong = items.reduce((sum, item) => sum + item.wrong, 0);
      const accuracy = progress.stats.questions
        ? Math.round((progress.stats.correct / progress.stats.questions) * 100)
        : 0;
      const overall = Math.round((items.reduce((sum, item) => sum + item.level, 0) / (deck.length * 5)) * 100);

      return {
        total: deck.length,
        studied,
        confident,
        favorites,
        weak,
        wrong,
        questions: progress.stats.questions,
        correct: progress.stats.correct,
        sessions: progress.stats.sessions,
        spreads: progress.stats.spreads,
        accuracy,
        overall
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function sample(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function shuffled(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function getSuitLesson(label) {
      return suitLessons[label] || null;
    }

    function getNumberLesson(rank) {
      return numberLessons.find((item) => item.rank === rank) || null;
    }

    function getCourtLesson(rank) {
      return courtLessons.find((item) => item.rank === rank) || null;
    }

    function getRankLesson(rank) {
      return getNumberLesson(rank) || getCourtLesson(rank);
    }

    function minorCards() {
      return deck.filter((card) => card.type === "minor");
    }

    function courtDeck() {
      return deck.filter((card) => ["Паж", "Рыцарь", "Королева", "Король"].includes(card.rank));
    }

    function getDailyFocus() {
      const today = new Date().toISOString().slice(0, 10);
      try {
        const saved = JSON.parse(localStorage.getItem(DAILY_FOCUS_KEY) || "{}");
        if (saved.date === today && Number.isInteger(saved.index)) {
          return dailyFocuses[saved.index % dailyFocuses.length];
        }
        const index = Math.floor(Math.random() * dailyFocuses.length);
        localStorage.setItem(DAILY_FOCUS_KEY, JSON.stringify({ date: today, index }));
        return dailyFocuses[index];
      } catch (error) {
        return sample(dailyFocuses);
      }
    }

    function getWrongOptions(correctCard, sourceDeck = deck, amount = 3) {
      return shuffled(sourceDeck.filter((card) => card.id !== correctCard.id)).slice(0, amount);
    }

    function levelText(level) {
      if (level <= 0) return "0/5";
      return `${level}/5`;
    }

    function levelPips(level) {
      return `${"●".repeat(level)}${"○".repeat(5 - level)}`;
    }

    function cardProgress(cardId) {
      return progress.cards[cardId] || cardDefaultProgress();
    }

    function markCard(cardId, result) {
      const item = cardProgress(cardId);
      if (result === "correct") {
        item.correct += 1;
        item.level = clamp(item.level + 1, 0, 5);
        if (item.level >= 3) item.studied = true;
      } else {
        item.wrong += 1;
        item.level = clamp(item.level - 1, 0, 5);
      }
      progress.cards[cardId] = item;
      saveProgress();
    }

    function setSelfRating(cardId, level) {
      const item = cardProgress(cardId);
      item.level = level;
      item.studied = level >= 2;
      progress.cards[cardId] = item;
      saveProgress();
      render();
    }

    function toggleFavorite(cardId) {
      const item = cardProgress(cardId);
      item.favorite = !item.favorite;
      progress.cards[cardId] = item;
      saveProgress();
      render();
    }

    function markJourney(cardId) {
      const item = cardProgress(cardId);
      item.studied = true;
      item.level = Math.max(item.level, 2);
      progress.cards[cardId] = item;
      saveProgress();
      render();
    }

    function getFilteredCards() {

        if (state.filter === "favorites") return item.favorite;
        if (state.filter === "weak") return item.wrong > 0 && (item.wrong >= item.correct || item.level < 3);
        return card.suit === state.filter;
      });

            <div>
              <h2>Путь Шута</h2>
              <p class="muted">Старшие арканы как путь героя: от первого шага до целостного завершения цикла.</p>
            </div>
          </div>
          <details class="control-menu">
            <summary>Настройки чтения</summary>
            <div class="control-menu-content">
              <button class="btn" type="button" data-reading-mode="${state.readingMode ? "off" : "on"}">${state.readingMode ? "Показать меню" : "Скрыть навигацию для чтения"}</button>
              <button class="btn primary" type="button" data-route="suits">Открыть раздел «Масти»</button>
            </div>
          </details>
          <div class="journey-list">
            ${majorArcana.map((card, index) => renderJourneyStep(card, index)).join("")}
          </div>
        </section>
      `;
    }

    function renderJourneyStep(card, index) {
      const item = cardProgress(card.id);
      return `
        <article class="journey-card ${item.studied ? "done" : ""}">
          <div class="detail-top">
            <div class="sigil" aria-hidden="true">${card.symbol}</div>
            <div>
              <p class="eyebrow">${String(index + 1).padStart(2, "0")} шаг</p>
              <h3>${card.name}: ${card.journey.title}</h3>
            </div>
          </div>
          <p class="muted">${card.journey.story}</p>
          <div class="info-grid">
            ${renderNote("Главный урок", card.journey.lesson)}
            ${renderNote("Вопрос к себе", card.journey.question)}
          </div>
          <button class="btn ${item.studied ? "selected" : "primary"}" type="button" data-journey-study="${card.id}">
            ${item.studied ? "Изучено" : "Отметить как изучено"}
          </button>
        </article>
      `;
    }

    function getTrainingMode(modeId = state.selectedTrainingMode) {
      return trainingModes.find((mode) => mode.id === modeId) || trainingModes[0];
    }

    function questionMakersFor(modeId) {
      const makers = {
        meaning: makeMeaningToCardQuestion,
        cardMeaning: makeCardToMeaningQuestion,
        suitElement: makeSuitElementQuestion,
        majorMinor: makeMajorMinorQuestion,
        advice: makeAdviceQuestion,
        scenario: makeScenarioQuestion,
        shadow: makeShadowQuestion,
        memory: makeMemoryQuestion,
        suitSphere: makeSuitSphereQuestion,
        numberMeaning: makeNumberMeaningQuestion,
        courtRole: makeCourtRoleQuestion,
        suitFocus: makeSuitFocusQuestion
      };
      return getTrainingMode(modeId).makers.map((id) => makers[id]).filter(Boolean);
    }

    function openTrainingMenu() {
      state.route = "training";
      state.training = null;
      if (state.selectedTrainingMode === "suitFocus") {
        state.selectedTrainingMode = "suitsStudy";
        state.selectedTrainingSuit = "";
      }
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startTraining(total, modeId = state.selectedTrainingMode, suit = state.selectedTrainingSuit) {
      progress.stats.sessions += 1;
      saveProgress();
      state.route = "training";
      state.selectedTrainingMode = modeId;
      state.selectedTrainingSuit = suit || "";
      state.training = {
        modeId,
        suit: suit || "",
        total,
        infinite: total === "infinite",
        count: 0,
        current: null,
        answered: false,
        selected: null,
        wasCorrect: null
      };
      nextQuestion();
    }

    function nextQuestion() {
      if (!state.training) startTraining(5);
      if (!state.training.infinite && state.training.count >= state.training.total) {
        state.training.current = null;
        render();
        return;
      }
      state.training.current = createQuestion(state.training.modeId);
      state.training.answered = false;
      state.training.selected = null;
      state.training.wasCorrect = null;
      state.training.count += 1;
      render();
    }

    function createQuestion(modeId = "mixed") {
      const makers = questionMakersFor(modeId);
      return sample(makers)();
    }

    function makeMeaningToCardQuestion() {
      const card = sample(deck);
      const options = shuffled([card, ...getWrongOptions(card)]).map((item) => ({
        value: item.id,
        label: item.name
      }));
      return {
        type: "Угадай карту по значению",
        cardId: card.id,
        prompt: card.meaning,
        options,
        correct: card.id,
        explanation: `${card.name}: ${card.memory}`
      };
    }

    function makeCardToMeaningQuestion() {
      const card = sample(deck);
      const options = shuffled([card, ...getWrongOptions(card)]).map((item) => ({
        value: item.id,
        label: item.meaning
      }));
      return {
        type: "Угадай значение карты",
        cardId: card.id,
        prompt: `Как лучше всего прочитать карту «${card.name}»?`,
        options,
        correct: card.id,
        explanation: `${card.name} говорит так: ${card.advice}`
      };
    }

    function makeSuitElementQuestion() {
      const card = sample(deck);
      const correctLabel = card.type === "major"
        ? `Старший аркан, ${card.element}`
        : `${card.suit}, ${card.element}`;
      const optionLabels = shuffled([
        correctLabel,
        "Жезлы, Огонь",
        "Кубки, Вода",
        "Мечи, Воздух",
        "Пентакли, Земля",
        "Старший аркан, Дух"
      ].filter((label, index, array) => array.indexOf(label) === index)).slice(0, 4);

      if (!optionLabels.includes(correctLabel)) optionLabels[0] = correctLabel;

      return {
        type: "Масть и стихия",
        cardId: card.id,
        prompt: `К какой группе относится «${card.name}»?`,
        options: shuffled(optionLabels).map((label) => ({ value: label, label })),
        correct: correctLabel,
        explanation: `${card.name} относится к группе «${card.groupLabel}», стихия: ${card.element}.`
      };
    }

    function makeMajorMinorQuestion() {
      const card = sample(deck);
      const correct = card.type === "major" ? "Старший аркан" : "Младший аркан";
      return {
        type: "Старший или младший аркан",
        cardId: card.id,
        prompt: `«${card.name}» - это какая карта?`,
        options: ["Старший аркан", "Младший аркан", "Карта двора", "Масть без ранга"].map((label) => ({ value: label, label })),
        correct,
        explanation: `${card.name}: ${card.groupLabel}. ${card.meaning}`
      };
    }

    function makeAdviceQuestion() {
      const card = sample(deck);
      const options = shuffled([card, ...getWrongOptions(card)]).map((item) => ({
        value: item.id,
        label: item.name
      }));
      return {
        type: "Совет карты",
        cardId: card.id,
        prompt: `Какая карта лучше всего подходит к совету: «${card.advice}»?`,
        options,
        correct: card.id,
        explanation: `${card.name} подходит, потому что ее образ помогает увидеть: ${card.meaning}`
      };
    }

    function makeScenarioQuestion() {
      const item = sample(advancedQuestionBank);
      const card = byId.get(item.cardId);
      const options = shuffled([card, ...getWrongOptions(card)]).map((optionCard) => ({
        value: optionCard.id,
        label: optionCard.name
      }));
      return {
        type: "Сложная ситуация",
        cardId: card.id,
        prompt: item.situation,
        options,
        correct: card.id,
        explanation: item.explanation
      };
    }

    function makeShadowQuestion() {
      const card = sample(deck);
      const options = shuffled([card, ...getWrongOptions(card)]).map((optionCard) => ({
        value: optionCard.id,
        label: optionCard.shadow
      }));
      return {
        type: "Теневая сторона",
        cardId: card.id,
        prompt: `Какая теневая сторона точнее всего относится к карте «${card.name}»?`,
        options,
        correct: card.id,
        explanation: `${card.name}: ${card.shadow}`
      };
    }

    function makeMemoryQuestion() {
      const card = sample(deck);
      const options = shuffled([card, ...getWrongOptions(card)]).map((optionCard) => ({
        value: optionCard.id,
        label: optionCard.name
      }));
      return {
        type: "Образ для запоминания",
        cardId: card.id,
        prompt: `Какая карта лучше всего запоминается через такой образ: «${card.memory}»?`,
        options,
        correct: card.id,
        explanation: `${card.name} можно держать в памяти так: ${card.memory}`
      };
    }

    function makeSuitSphereQuestion() {
      const suit = sample(Object.keys(suitLessons));
      const lesson = getSuitLesson(suit);
      const options = shuffled(Object.entries(suitLessons).map(([label, item]) => ({
        value: label,
        label: `${label}: ${item.sphere}`
      })));
      const card = sample(deck.filter((item) => item.suit === suit));
      return {
        type: "Масть и сфера",
        cardId: card.id,
        prompt: `Какая масть отвечает за сферу: ${lesson.sphere}?`,
        options,
        correct: suit,
        explanation: `${suit}: ${lesson.formula} ${lesson.reading}`
      };
    }

    function makeNumberMeaningQuestion() {
      const lesson = sample(numberLessons);
      const options = shuffled(numberLessons).slice(0, 4);
      if (!options.some((item) => item.rank === lesson.rank)) options[0] = lesson;
      const card = sample(minorCards().filter((item) => item.rank === lesson.rank));
      return {
        type: "Числа младших арканов",
        cardId: card.id,
        prompt: `Какой этап показывает число «${lesson.rank}»?`,
        options: shuffled(options).map((item) => ({
          value: item.rank,
          label: `${item.rank}: ${item.meaning}`
        })),
        correct: lesson.rank,
        explanation: `${lesson.rank}: ${lesson.meaning}. Вопрос для памяти: ${lesson.question}`
      };
    }

    function makeCourtRoleQuestion() {
      const lesson = sample(courtLessons);
      const options = shuffled(courtLessons).map((item) => ({
        value: item.rank,
        label: `${item.rank}: ${item.role}`
      }));
      const card = sample(courtDeck().filter((item) => item.rank === lesson.rank));
      return {
        type: "Придворные карты",
        cardId: card.id,
        prompt: `Какая придворная роль звучит так: «${lesson.behavior}»?`,
        options,
        correct: lesson.rank,
        explanation: `${lesson.rank}: ${lesson.role}. Это помогает читать придворные карты как поведение или роль.`
      };
    }

    function makeSuitFocusQuestion() {
      const suit = state.training && state.training.suit ? state.training.suit : state.selectedTrainingSuit;
      const cards = deck.filter((card) => card.suit === suit);
      const card = cards.length ? sample(cards) : sample(minorCards());
      const lesson = getSuitLesson(card.suit);
      const options = shuffled([card, ...getWrongOptions(card, cards.length >= 4 ? cards : minorCards())]).map((item) => ({
        value: item.id,
        label: item.name
      }));
      return {
        type: `Фокус на масти: ${card.suit}`,
        cardId: card.id,
        prompt: `Какая карта масти «${card.suit}» лучше подходит к смыслу: ${card.meaning}`,
        options,
        correct: card.id,
        explanation: `${card.name}: ${lesson ? lesson.formula : card.groupLabel} ${card.memory}`
      };
    }

    function answerQuestion(value) {
      const training = state.training;
      if (!training || training.answered) return;

      const question = training.current;
      const isCorrect = value === question.correct;
      training.answered = true;
      training.selected = value;
      training.wasCorrect = isCorrect;

      progress.stats.questions += 1;
      if (isCorrect) progress.stats.correct += 1;
      markCard(question.cardId, isCorrect ? "correct" : "wrong");
      saveProgress();
      render();
    }

    function renderTrainingModeCard(mode) {
      const selected = state.selectedTrainingMode === mode.id;
      return `
        <button class="mode-card ${selected ? "selected" : ""}" type="button" data-training-mode="${mode.id}" aria-current="${selected ? "true" : "false"}">
          <span class="chip">${mode.label}</span>
          <strong>${mode.title}</strong>
          <span class="muted">${mode.description}</span>
        </button>
      `;
    }

    function renderTraining() {
      const training = state.training;
      if (!training) {
        const selectedMode = getTrainingMode();
        return `
          <section class="view">
            <div class="section-head">
              <div>
                <h2>Тренировка</h2>
                <p class="muted">Выбери тип вопросов и длину занятия. Можно начать с базы, а потом перейти к ситуациям и теневым сторонам карт.</p>
              </div>
            </div>

            <details class="control-menu">
              <summary>Тип тренировки: ${selectedMode.title}</summary>
              <div class="control-menu-content">
                <div class="mode-grid">
                ${trainingModes.filter((mode) => mode.id !== "suitFocus").map(renderTrainingModeCard).join("")}
                </div>
              </div>
            </details>

            <section class="panel panel-pad">
              <h3>Длина занятия</h3>
              <p class="muted">Сейчас выбран режим: ${selectedMode.title}.</p>
              <div class="button-row">
                <button class="btn primary" type="button" data-start-training="5">5 вопросов</button>
                <button class="btn" type="button" data-start-training="10">10 вопросов</button>
                <button class="btn" type="button" data-start-training="infinite">Бесконечный режим</button>
              </div>
            </section>
          </section>
        `;
      }

      const trainingMode = getTrainingMode(training.modeId);

      if (!training.current) {
        const stats = getStats();
        return `
          <section class="view">
            <article class="panel question-card magic-card">
              <p class="eyebrow">Тренировка завершена</p>
              <h2>Хороший короткий подход</h2>
              <p class="muted">Режим: ${trainingMode.title}. Ты ответил на ${training.count} вопросов. Общая точность сейчас ${stats.accuracy}%.</p>
              <div class="button-row">
                <button class="btn primary" type="button" data-start-training="5">Еще 5 вопросов</button>
                <button class="btn" type="button" data-training-menu>Сменить режим</button>
                <button class="btn" type="button" data-route="progress">Посмотреть прогресс</button>
              </div>
            </article>
          </section>
        `;
      }

      const question = training.current;
      const totalLabel = training.infinite ? "∞" : training.total;
      return `
        <section class="view">
          <article class="panel question-card magic-card">
            <div>
              <p class="question-type">${question.type}</p>
              <h2>Вопрос ${training.count} из ${totalLabel}</h2>
              <p class="eyebrow">${trainingMode.title}</p>
              <p class="question-text">${question.prompt}</p>
            </div>

            <div class="answer-grid">
              ${question.options.map((option) => {
                let stateClass = "";
                if (training.answered) {
                  if (option.value === question.correct) stateClass = "correct";
                  if (option.value === training.selected && option.value !== question.correct) stateClass = "wrong";
                }
                return `<button class="btn answer ${stateClass}" type="button" data-answer="${option.value}" ${training.answered ? "disabled" : ""}>${option.label}</button>`;
              }).join("")}
            </div>

            ${training.answered ? `
              <div class="note result">
                <h3>${training.wasCorrect ? "Верно" : "Почти, но нет"}</h3>
                <p class="muted">${question.explanation}</p>
              </div>
              <div class="button-row">
                <button class="btn primary" type="button" data-next-question>Следующий вопрос</button>
              </div>
              <details class="control-menu">
                <summary>Настройки тренировки</summary>
                <div class="control-menu-content">
                  <button class="btn" type="button" data-training-menu>Сменить режим</button>
                </div>
              </details>
            ` : `
              <details class="control-menu">
                <summary>Настройки тренировки</summary>
                <div class="control-menu-content">
                  <button class="btn" type="button" data-training-menu>Сменить режим</button>
                </div>
              </details>
            `}
          </article>
        </section>
      `;
    }

    function drawPathCards() {
      state.pathCards = shuffled(deck).slice(0, 3).map((card) => card.id);
      render();
    }

    function renderPathAction(day) {
      if (!day.action) return "";
      const action = day.action;
      if (action.type === "drawPathCards") {
        return `<button class="btn primary" type="button" data-path-draw>${action.label}</button>`;
      }
      if (action.type === "route") {
        return `<button class="btn primary" type="button" data-route="${action.route}">${action.label}</button>`;
      }
      if (action.type === "training") {
        return `<button class="btn primary" type="button" data-start-training="${action.total}" data-start-training-mode="${action.mode}">${action.label}</button>`;
      }
      if (action.type === "cardsFilter") {
        return `<button class="btn primary" type="button" data-cards-filter="${action.filter}">${action.label}</button>`;
      }
      return "";
    }

    function renderPathCards() {
      if (!state.pathCards.length) return "";
      return `
        <div class="mini-card-grid">
          ${state.pathCards.map((id) => {
            const card = byId.get(id);
            return `
              <div class="mini-card">
                <span>${card.symbol}</span>
                <strong>${card.name}</strong>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderLearningDay(day) {
      const pathStats = getLearningPathStats();
      const done = pathStats.completedDays.includes(day.day);
      return `
        <details class="day-card ${done ? "done" : ""}" ${day.day === Math.min(pathStats.completed + 1, learningPathDays.length) ? "open" : ""}>
          <summary>
            <span class="day-number">${day.day}</span>
            <span>
              <strong>День ${day.day}. ${day.title}</strong>
              <span class="meta"><span>${day.goal}</span></span>
            </span>
            <span class="day-status">${done ? "✓" : ""}</span>
          </summary>
          <div class="day-content">
            ${renderNote("Цель", day.goal)}
            <div class="note">
              <h3>Короткая теория</h3>
              ${day.theory.map((text) => `<p class="muted">${text}</p>`).join("")}
            </div>
            ${renderNote("Практика", day.practice)}
            ${day.day === 1 ? renderPathCards() : ""}
            <div class="button-row">
              ${renderPathAction(day)}
              <button class="btn ${done ? "selected" : "good"}" type="button" data-complete-path-day="${day.day}">
                ${done ? "День пройден" : "Отметить день как пройденный"}
              </button>
            </div>
          </div>
        </details>
      `;
    }

    function renderLearningPath() {
      const pathStats = getLearningPathStats();
      return `
        <section class="view">
          <div class="section-head">
            <div>
              <h2>Маршрут</h2>
              <p class="muted">7 дней, чтобы новичок не терялся: короткая теория, маленькая практика и понятный следующий шаг.</p>
            </div>
          </div>

          <section class="panel path-overview magic-card">
            <div>
              <p class="eyebrow">Учебный маршрут: 7 дней</p>
              <h3>${pathStats.completed}/${pathStats.total} дней пройдено</h3>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${pathStats.percent}%"></div>
              </div>
            </div>
            <details class="control-menu">
              <summary>Управление маршрутом</summary>
              <div class="control-menu-content">
                <button class="btn" type="button" data-reading-mode="${state.readingMode ? "off" : "on"}">${state.readingMode ? "Показать меню" : "Скрыть навигацию для чтения"}</button>
                <button class="btn warn" type="button" data-reset-path>Сбросить маршрут</button>
              </div>
            </details>
          </section>

          <div class="list" style="margin-top: 14px;">
            ${learningPathDays.map(renderLearningDay).join("")}
          </div>
        </section>
      `;
    }

    function drawSpread() {
      const cards = shuffled(deck).slice(0, 4);
      state.spread = spreadPositions.map((position, index) => ({
        ...position,
        cardId: cards[index].id
      }));
      state.showReading = false;
      state.spreadNote = "";
      progress.stats.spreads += 1;
      saveProgress();
      render();
    }

    function positionHint(position, card) {
      const lead = {
        now: "Сейчас карта подсвечивает главную тему:",
        influence: "Как влияние она показывает фон:",
        direction: "В направлении развития звучит так:",
        advice: "В позиции совета предлагает:"
      };
      return `${lead[position.key]} ${card.meaning}`;
    }

    function renderSpread() {
      return `
        <section class="view">
          <div class="section-head">
            <div>
              <h2>Расклад-тренажер</h2>
              <p class="muted">Тренируй не предсказание, а связный рассказ. Четыре карты помогают увидеть ситуацию как маленькую историю.</p>
            </div>
          </div>

          ${state.spread ? `
            <details class="control-menu">
              <summary>Управление раскладом</summary>
              <div class="control-menu-content">
                <button class="btn" type="button" data-draw-spread>Собрать новый расклад</button>
                <button class="btn" type="button" data-reading-mode="${state.readingMode ? "off" : "on"}">${state.readingMode ? "Показать меню" : "Скрыть навигацию для чтения"}</button>
              </div>
            </details>
          ` : `<button class="btn primary" type="button" data-draw-spread>Собрать тренировочный расклад</button>`}

          ${state.spread ? `
            <div class="spread-grid" style="margin-top: 14px;">
              ${state.spread.map((position) => {
                const card = byId.get(position.cardId);
                return `
                  <article class="spread-position">
                    <div class="sigil" aria-hidden="true">${card.symbol}</div>
                    <div>
                      <p class="eyebrow">${position.title}</p>
                      <h3>${card.name}</h3>
                      <p class="meta">${card.keywords.map((word) => `<span class="chip">${word}</span>`).join("")}</p>
                      <p class="muted">${positionHint(position, card)}</p>
                    </div>
                  </article>
                `;
              }).join("")}
            </div>

            <section class="panel panel-pad" style="margin-top: 14px;">
              <h3>Попробуй сказать это человеческим языком</h3>
              <p class="muted">Сначала напиши свою версию. Не ищи идеальные слова: просто свяжи карты в понятную историю.</p>
              <textarea class="textarea" id="readingText" placeholder="Моя трактовка" aria-label="Моя трактовка">${escapeHtml(state.spreadNote)}</textarea>
              <button class="btn primary" type="button" data-show-reading style="margin-top: 10px;">Показать пример трактовки</button>
            </section>

            ${state.showReading ? renderReadingExample() : ""}
          ` : `
            <div class="empty" style="margin-top: 14px;">Нажми кнопку выше, чтобы вытянуть 4 карты для учебного расклада.</div>
          `}
        </section>
      `;
    }

    function renderReadingExample() {
      const [now, influence, direction, advice] = state.spread.map((position) => ({
        position,
        card: byId.get(position.cardId)
      }));
      return `
        <article class="panel panel-pad magic-card" style="margin-top: 14px;">
          <h3>Пример связного рассказа</h3>
          <p class="muted">
            Если сказать просто, сейчас тема похожа на «${now.card.name}»: ${now.card.meaning}
            На ситуацию влияет «${influence.card.name}» - это добавляет оттенок: ${influence.card.keywords.slice(0, 2).join(", ")}.
            Дальше история может двигаться к «${direction.card.name}», то есть к опыту, где важно ${direction.card.advice.toLowerCase()}
            А совет «${advice.card.name}» звучит мягко: ${advice.card.advice}
          </p>
          <p class="muted">
            Хорошая трактовка не обязана звучать мистически. Главное - увидеть, что происходит, что влияет, куда идет процесс и какой следующий шаг будет самым бережным.
          </p>
        </article>
      `;
    }

    function getAchievements(stats) {
      const rules = [
        [1, "Первый вопрос", "Начать путь с первого ответа", stats.questions >= 1],
        [1, "Первое попадание", "Ответить правильно хотя бы раз", stats.correct >= 1],
        [1, "Личная полка", "Добавить первую карту в избранное", stats.favorites >= 1],
        [1, "Первая изученная", "Отметить или выучить одну карту", stats.studied >= 1],
        [3, "Малый круг", "Изучить 3 карты", stats.studied >= 3],
        [5, "Пять шагов", "Пройти 5 вопросов", stats.questions >= 5],
        [50, "Половина света", "Держать точность от 50% после 5 вопросов", stats.questions >= 5 && stats.accuracy >= 50],
        [2, "Вернулся к практике", "Начать 2 тренировки", stats.sessions >= 2],
        [1, "Уверенная карта", "Поднять карту до уровня 4+", stats.confident >= 1],
        [1, "Первый расклад", "Собрать тренировочный расклад", stats.spreads >= 1],
        [10, "Десять вопросов", "Пройти 10 вопросов", stats.questions >= 10],
        [1, "Честная ошибка", "Увидеть первую слабую карту", stats.weak >= 1],
        [3, "Три истории", "Собрать 3 расклада", stats.spreads >= 3],
        [7, "Семь знакомых", "Изучить 7 карт", stats.studied >= 7],
        [60, "Ровный ритм", "Держать точность от 60% после 10 вопросов", stats.questions >= 10 && stats.accuracy >= 60],
        [3, "Работа с тенью", "Накопить 3 слабые карты для повторения", stats.weak >= 3],
        [10, "Десять верных", "Ответить правильно 10 раз", stats.correct >= 10],
        [3, "Три опоры", "Уверенно знать 3 карты", stats.confident >= 3],
        [25, "Длинная тропа", "Пройти 25 вопросов", stats.questions >= 25],
        [70, "Ясный день", "Держать точность от 70% после 20 вопросов", stats.questions >= 20 && stats.accuracy >= 70],
        [15, "Большая полка", "Изучить 15 карт", stats.studied >= 15],
        [25, "Первый цикл", "Довести общий прогресс до 25%", stats.overall >= 25]
      ];

      return majorArcana.map((card, index) => ({
        card,
        title: rules[index][1],
        description: rules[index][2],
        progress: rules[index][0],
        unlocked: rules[index][3]
      }));
    }

    function renderAchievement(achievement) {
      return `
        <article class="achievement-card ${achievement.unlocked ? "unlocked" : ""}">
          <div class="sigil" aria-hidden="true">${achievement.card.symbol}</div>
          <div>
            <p class="eyebrow">${achievement.unlocked ? "Открыто" : "Закрыто"} - ${achievement.card.name}</p>
            <h3>${achievement.title}</h3>
            <p class="muted">${achievement.description}</p>
          </div>
        </article>
      `;
    }

    function renderGuide() {
      return `
        <section class="view">
          <div class="section-head">
            <div>
              <h2>Справка</h2>
              <p class="muted">Короткие материалы для чтения: история Таро, структура колоды, масти, расклады и спокойный подход к практике.</p>
            </div>
          </div>

          <details class="control-menu">
            <summary>Настройки чтения</summary>
            <div class="control-menu-content">
              <button class="btn" type="button" data-reading-mode="${state.readingMode ? "off" : "on"}">${state.readingMode ? "Показать меню" : "Скрыть навигацию для чтения"}</button>
              <button class="btn primary" type="button" data-route="suits">Открыть раздел «Масти»</button>
            </div>
          </details>

          <div class="list">
            ${guideSections.map((section, index) => `
              <details class="control-menu" ${index === 0 ? "open" : ""}>
                <summary>${section.title}</summary>
                <div class="control-menu-content">
                  <p class="muted">${section.text}</p>
                </div>
              </details>
            `).join("")}
          </div>

          <p class="fine-print">Материалы приложения предназначены для обучения, самоанализа и развлечения. Они не являются медицинской, юридической или финансовой рекомендацией.</p>
        </section>
      `;
    }

    function renderProgress() {
      const stats = getStats();
      const achievements = getAchievements(stats);
      const unlockedAchievements = achievements.filter((achievement) => achievement.unlocked).length;
      const weakCards = deck.filter((card) => {
        const item = cardProgress(card.id);
        return item.wrong > 0 && (item.wrong >= item.correct || item.level < 3);
      }).slice(0, 5);

      return `
        <section class="view">
          <div class="section-head">
            <div>
              <h2>Прогресс</h2>
              <p class="muted">Здесь видно, как растет знакомство с колодой. Уровень карты повышается за верные ответы и самооценку.</p>
            </div>
          </div>

          <section class="panel hero-card magic-card">
            <div class="progress-grid">
              ${renderStat("78", "всего карт")}
              ${renderStat(stats.studied, "изучено")}
              ${renderStat(stats.confident, "уверенно знаю")}
              ${renderStat(stats.favorites, "избранные")}
              ${renderStat(stats.weak, "слабые карты")}
              ${renderStat(`${stats.accuracy}%`, "точность")}
            </div>
            <div>
              <p class="muted">Общий уровень: ${stats.overall}%</p>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${stats.overall}%"></div>
              </div>
            </div>
          </section>

          <section class="panel panel-pad" style="margin-top: 14px;">
            <h3>Ачивки старших арканов</h3>
            <p class="muted">Каждая ачивка открывает образ старшего аркана. Сейчас открыто ${unlockedAchievements} из ${achievements.length}.</p>
            <div class="achievement-grid">
              ${achievements.map(renderAchievement).join("")}
            </div>
          </section>

          <section class="panel panel-pad" style="margin-top: 14px;">
            <h3>Статистика тренировок</h3>
            <div class="progress-list">
              <div class="note"><strong>${stats.questions}</strong><p class="muted">пройденных вопросов</p></div>
              <div class="note"><strong>${stats.correct}</strong><p class="muted">правильных ответов</p></div>
              <div class="note"><strong>${stats.sessions}</strong><p class="muted">начатых тренировок</p></div>
              <div class="note"><strong>${stats.spreads}</strong><p class="muted">собранных раскладов</p></div>
            </div>
          </section>

          <section class="panel panel-pad" style="margin-top: 14px;">
            <h3>Слабые карты</h3>
            ${weakCards.length ? `
              <div class="list">
                ${weakCards.map(renderCardRow).join("")}
              </div>
            ` : `<p class="muted">Пока нет слабых карт. Ошибки появятся здесь как подсказки для повторения, а не как повод ругать себя.</p>`}
          </section>

          <button class="btn warn" type="button" data-reset-progress style="width: 100%; margin-top: 14px;">Сбросить прогресс</button>

          <p class="fine-print">Материалы приложения предназначены для обучения, самоанализа и развлечения. Они не являются медицинской, юридической или финансовой рекомендацией.</p>
        </section>
      `;
    }

    function renderStat(value, label) {
      return `
        <div class="stat">
          <strong>${value}</strong>
          <span>${label}</span>
        </div>
      `;
    }

    document.addEventListener("click", (event) => {
      const routeButton = event.target.closest("[data-route]");
      if (routeButton) {
        navigate(routeButton.dataset.route);
        return;
      }

      const readingModeButton = event.target.closest("[data-reading-mode]");
      if (readingModeButton) {
        state.readingMode = readingModeButton.dataset.readingMode === "on";
        render();
        return;
      }

      const trainingButton = event.target.closest("[data-start-training]");
      if (trainingButton) {
        const value = trainingButton.dataset.startTraining;
        const mode = trainingButton.dataset.startTrainingMode || state.selectedTrainingMode;
        startTraining(value === "infinite" ? "infinite" : Number(value), mode);
        return;
      }

      const trainSuitButton = event.target.closest("[data-train-suit]");
      if (trainSuitButton) {
        startTraining(5, "suitFocus", trainSuitButton.dataset.trainSuit);
        return;
      }

      const cardsFilterButton = event.target.closest("[data-cards-filter]");
      if (cardsFilterButton) {
        navigateCardsFilter(cardsFilterButton.dataset.cardsFilter);
        return;
      }

      if (event.target.closest("[data-path-draw]")) {
        drawPathCards();
        return;
      }

      const completePathButton = event.target.closest("[data-complete-path-day]");
      if (completePathButton) {
        completeLearningDay(Number(completePathButton.dataset.completePathDay));
        return;
      }

      if (event.target.closest("[data-reset-path]")) {
        const confirmed = window.confirm("Сбросить прогресс учебного маршрута?");
        if (confirmed) {
          resetLearningPath();
        }
        return;
      }

      const trainingModeButton = event.target.closest("[data-training-mode]");
      if (trainingModeButton) {
        state.selectedTrainingMode = trainingModeButton.dataset.trainingMode;
        render();
        return;
      }

      if (event.target.closest("[data-training-menu]")) {
        openTrainingMenu();
        return;
      }

      const filterButton = event.target.closest("[data-filter]");
      if (filterButton) {
        state.filter = filterButton.dataset.filter;
        state.selectedCardId = null;
        render();
        return;
      }

      const cardButton = event.target.closest("[data-card-id]");
      if (cardButton) {
        state.route = "cards";
        state.selectedCardId = cardButton.dataset.cardId;
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
        return;
      }

      if (event.target.closest("[data-close-detail]")) {
        state.selectedCardId = null;
        render();
        return;
      }

      const favoriteButton = event.target.closest("[data-favorite]");
      if (favoriteButton) {
        toggleFavorite(favoriteButton.dataset.favorite);
        return;
      }

      const rateButton = event.target.closest("[data-rate]");
      if (rateButton) {
        setSelfRating(rateButton.dataset.rate, Number(rateButton.dataset.level));
        return;
      }

      const journeyButton = event.target.closest("[data-journey-study]");
      if (journeyButton) {
        markJourney(journeyButton.dataset.journeyStudy);
        return;
      }

      const answerButton = event.target.closest("[data-answer]");
      if (answerButton) {
        answerQuestion(answerButton.dataset.answer);
        return;
      }

      if (event.target.closest("[data-next-question]")) {
        nextQuestion();
        return;
      }

      if (event.target.closest("[data-draw-spread]")) {
        drawSpread();
        return;
      }

      if (event.target.closest("[data-show-reading]")) {
        const readingText = document.querySelector("#readingText");
        state.spreadNote = readingText ? readingText.value : state.spreadNote;
        state.showReading = true;
        render();
        return;
      }

      if (event.target.closest("[data-reset-progress]")) {
        const confirmed = window.confirm("Сбросить весь прогресс обучения?");
        if (confirmed) {
          resetProgress();
          state.training = null;
          state.selectedCardId = null;
          render();
        }
      }
    });

    document.addEventListener("input", (event) => {
      if (event.target && event.target.id === "readingText") {
        state.spreadNote = event.target.value;
      }
    });

    render();
  </script>
</body>
</html>
